<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omnithrix — Digital Content Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 560px; padding: 60px 30px; text-align: center; }
    .logo { width: 100px; height: 100px; margin: 0 auto 36px; border-radius: 50%; border: 1px solid #c9a84c33; }
    h1 { font-size: 2.2rem; font-weight: 300; letter-spacing: 0.15em; color: #c9a84c; margin-bottom: 6px; }
    .tagline { font-size: 0.95rem; color: #777; margin-bottom: 48px; }
    .channels { display: flex; flex-direction: column; gap: 14px; margin-bottom: 48px; }
    a.ch { display: flex; align-items: center; gap: 14px; padding: 14px 20px; border: 1px solid #1a1a2e; border-radius: 10px; color: #e0e0e0; text-decoration: none; transition: border-color .2s, background .2s; }
    a.ch:hover { border-color: #c9a84c; background: #0f0f24; }
    .ch-icon { width: 36px; height: 36px; border-radius: 8px; background: #1a1a2e; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .ch-name { font-weight: 600; font-size: 0.95rem; }
    .ch-desc { font-size: 0.7rem; color: #555; margin-top: 2px; }
    .foot { margin-top: 50px; font-size: 0.7rem; color: #333; }
    .foot a { color: #555; text-decoration: none; margin: 0 10px; }
    .foot a:hover { color: #c9a84c; }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Omnithrix" class="logo">
    <h1>OMNITHRIX</h1>
    <p class="tagline">Digital Content Studio</p>
    <div class="channels">
      <a class="ch" href="https://www.youtube.com/@TrySolveThis" target="_blank">
        <div class="ch-icon">&#x1F9E9;</div>
        <div>
          <div class="ch-name">Try Solve This</div>
          <div class="ch-desc">Daily puzzle challenges — brain teasers &amp; matchstick puzzles</div>
        </div>
      </a>
    </div>
    <div class="foot">
      <a href="mailto:omnithrix+www@gmail.com">Contact</a>
      <a href="terms.html">Terms of Service</a>
      <a href="privacy.html">Privacy Policy</a>
      <br><br>&copy; 2026 Omnithrix
    </div>
  </div>
</body>
</html>
